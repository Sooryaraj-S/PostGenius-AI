<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="url(#mainGrad)" rx="6"/>
  
  <!-- Outer glow circle -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#mainGrad)" stroke-width="0.5" opacity="0.6"/>
  
  <!-- AI Brain/Neural Network shape -->
  <g fill="white" opacity="0.95">
    <!-- Center dot -->
    <circle cx="16" cy="16" r="2.5"/>
    
    <!-- Top arc of P -->
    <path d="M 14 12 Q 13 12 13 13.5 Q 13 15 14 15 L 15 15 Q 15.5 15 15.5 14.5 L 15.5 13.5 Q 15.5 12 14.5 12 L 14 12" fill="white"/>
    
    <!-- Vertical line of P -->
    <rect x="13.8" y="15" width="0.8" height="6" fill="white"/>
    
    <!-- Dot cluster on right (representing data) -->
    <circle cx="19" cy="11" r="1" fill="white" opacity="0.8"/>
    <circle cx="21" cy="13" r="0.8" fill="white" opacity="0.7"/>
    <circle cx="20" cy="16" r="0.9" fill="white" opacity="0.8"/>
    <circle cx="19" cy="19" r="0.8" fill="white" opacity="0.7"/>
    
    <!-- Connecting lines (subtle) -->
    <line x1="16" y1="16" x2="19" y2="11" stroke="white" stroke-width="0.4" opacity="0.5"/>
    <line x1="16" y1="16" x2="21" y2="13" stroke="white" stroke-width="0.4" opacity="0.4"/>
  </g>
  
  <!-- Sparkle effect -->
  <g fill="white" opacity="0.8">
    <polygon points="10,8 10.5,9 11,8 10.5,7" />
    <polygon points="26,24 26.8,25 27.6,24 26.8,23" />
  </g>
</svg>
