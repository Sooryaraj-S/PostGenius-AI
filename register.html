<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostGenius AI - Register</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&family=Noto+Sans+Malayalam:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .register-card {
            width: 100%;
            max-width: 500px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 20px;
            padding: 3rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slide-in-up-animation 0.6s ease;
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        .register-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .register-subtitle {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .register-form-group {
            margin-bottom: 1.25rem;
        }

        .register-label {
            display: block;
            color: #f1f5f9;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .register-input {
            width: 100%;
            padding: 0.9rem 1.25rem;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            color: #f1f5f9;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .register-input::placeholder {
            color: rgba(203, 213, 225, 0.5);
        }

        .register-input:focus {
            outline: none;
            border-color: #a855f7;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
            transform: translateY(-2px);
        }

        .password-strength {
            font-size: 0.8rem;
            margin-top: 0.25rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            display: none;
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
        }

        .register-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            margin-top: 1rem;
        }

        .register-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.6), 0 0 30px rgba(236, 72, 153, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            gap: 1rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(148, 163, 184, 0.2);
        }

        .divider-text {
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .google-register {
            width: 100%;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .google-register:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: #a855f7;
            transform: translateY(-2px);
        }

        .google-icon {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: white;
        }

        .register-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .register-footer a {
            color: #a855f7;
            font-weight: 600;
            transition: all 0.3s;
        }

        .register-footer a:hover {
            color: #ec4899;
        }

        .ai-illustration {
            position: absolute;
            top: 50%;
            right: 5%;
            transform: translateY(-50%);
            font-size: 10rem;
            opacity: 0.1;
            z-index: 1;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(-50px) translateY(0); }
            50% { transform: translateY(-50px) translateY(-20px); }
        }

        @media (max-width: 768px) {
            .register-card {
                max-width: 100%;
                padding: 2rem;
            }

            .ai-illustration {
                display: none;
            }

            .register-form-group {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-background"></div>
    <div class="particles" id="particles"></div>

    <!-- Navigation -->
    <nav>
        <div class="navbar">
            <div class="nav-logo">✨ PostGenius AI</div>
            <div class="nav-right">
                <select class="language-switcher" id="languageSelect">
                    <option value="en">English</option>
                    <option value="ta">தமிழ்</option>
                    <option value="ml">മലയാളം</option>
                    <option value="hi">हिन्दी</option>
                    <option value="te">తెలుగు</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- AI Illustration -->
    <div class="ai-illustration">🚀</div>

    <!-- Register Container -->
    <div class="register-container">
        <div class="register-card">
            <!-- Header -->
            <div class="register-header">
                <div class="register-logo">✨</div>
                <h1 class="register-title" data-i18n="register_title">Create Account</h1>
                <p class="register-subtitle" data-i18n="register_subtitle">Join PostGenius AI today</p>
            </div>

            <!-- Register Form -->
            <form id="registerForm">
                <!-- Full Name -->
                <div class="register-form-group">
                    <label class="register-label" data-i18n="register_name">Full Name</label>
                    <input type="text" name="name" class="register-input" placeholder="John Doe" required>
                </div>

                <!-- Email -->
                <div class="register-form-group">
                    <label class="register-label" data-i18n="register_email">Email Address</label>
                    <input type="email" name="email" class="register-input" placeholder="you@example.com" required>
                </div>

                <!-- Password -->
                <div class="register-form-group">
                    <label class="register-label" data-i18n="register_password">Password</label>
                    <input type="password" name="password" class="register-input" placeholder="••••••••" id="passwordInput" required>
                    <div class="password-strength" id="passwordStrength">Password must be at least 8 characters</div>
                </div>

                <!-- Confirm Password -->
                <div class="register-form-group">
                    <label class="register-label" data-i18n="register_confirm">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="register-input" placeholder="••••••••" required>
                </div>

                <!-- Register Button -->
                <button type="submit" class="register-btn" data-i18n="register_button">Create Account</button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span class="divider-text">OR</span>
            </div>

            <!-- Google Register -->
            <button class="google-register" onclick="handleGoogleRegister()">
                <div class="google-icon">G</div>
                <span data-i18n="register_google">Sign up with Google</span>
            </button>

            <!-- Login Link -->
            <div class="register-footer">
                <span data-i18n="register_have_account">Already have an account?</span>
                <a href="login.html" data-i18n="register_login">Sign In</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/language.js"></script>
    <script>
        // Create particles
        const particlesContainer = document.getElementById('particles');
        if (particlesContainer) {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 5 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.bottom = '-10px';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = Math.random() * 4 + 6 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Password strength indicator
        const passwordInput = document.getElementById('passwordInput');
        const passwordStrength = document.getElementById('passwordStrength');

        passwordInput.addEventListener('input', function() {
            if (this.value.length > 0) {
                passwordStrength.style.display = 'block';
                if (this.value.length >= 8) {
                    passwordStrength.style.background = 'rgba(16, 185, 129, 0.1)';
                    passwordStrength.style.color = '#10b981';
                    passwordStrength.textContent = '✓ Strong password';
                } else {
                    passwordStrength.style.background = 'rgba(168, 85, 247, 0.1)';
                    passwordStrength.style.color = '#a855f7';
                    passwordStrength.textContent = getTranslation('error_password');
                }
            } else {
                passwordStrength.style.display = 'none';
            }
        });

        // Form handling
        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const validator = new FormValidator('registerForm');
            validator.clearErrors();

            if (validator.validate()) {
                // Show loading state
                const submitBtn = registerForm.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.innerHTML = '<div class="spinner-loader" style="width: 20px; height: 20px; margin: 0 auto;"></div>';
                submitBtn.disabled = true;

                // Simulate registration
                setTimeout(() => {
                    const userEmail = document.querySelector('input[name="email"]').value;
                    const userName = document.querySelector('input[name="name"]').value;
                    
                    localStorage.setItem('userEmail', userEmail);
                    localStorage.setItem('userName', userName);
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    showNotification('Account created successfully!');
                    
                    setTimeout(() => {
                        navigateTo('dashboard.html');
                    }, 500);
                }, 1500);
            } else {
                validator.showErrors();
                showNotification(getTranslation('error_required'), 'error');
            }
        });

        // Google Register Handler
        function handleGoogleRegister() {
            const btn = event.target.closest('.google-register');
            btn.innerHTML = '<div class="spinner-loader" style="width: 20px; height: 20px; margin: 0 auto;"></div>';
            btn.disabled = true;

            setTimeout(() => {
                localStorage.setItem('userEmail', 'user@gmail.com');
                localStorage.setItem('userName', 'Google User');
                localStorage.setItem('isLoggedIn', 'true');
                showNotification('Google registration successful!');
                
                setTimeout(() => {
                    navigateTo('dashboard.html');
                }, 500);
            }, 1500);
        }
    </script>
</body>
</html>
