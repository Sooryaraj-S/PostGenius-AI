<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%;">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Brain icon representing AI -->
  <g filter="url(#glow)">
    <!-- Main brain shape -->
    <path d="M 100 30 C 120 30 130 45 130 70 C 130 85 125 95 120 105 L 120 140 C 120 150 110 160 100 160 C 90 160 80 150 80 140 L 80 105 C 75 95 70 85 70 70 C 70 45 80 30 100 30" 
          fill="url(#bgGradient)" stroke="#a855f7" stroke-width="2"/>
    
    <!-- Brain folds -->
    <path d="M 95 45 Q 95 50 100 50 Q 105 50 105 45" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <path d="M 90 60 Q 90 65 100 65 Q 110 65 110 60" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <path d="M 85 75 Q 85 80 100 80 Q 115 80 115 75" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Neural connection dots -->
    <circle cx="85" cy="55" r="3" fill="#a855f7" opacity="0.8"/>
    <circle cx="115" cy="55" r="3" fill="#a855f7" opacity="0.8"/>
    <circle cx="80" cy="75" r="3" fill="#ec4899" opacity="0.8"/>
    <circle cx="120" cy="75" r="3" fill="#ec4899" opacity="0.8"/>
    <circle cx="85" cy="95" r="3" fill="#a855f7" opacity="0.8"/>
    <circle cx="115" cy="95" r="3" fill="#a855f7" opacity="0.8"/>
    
    <!-- Neural connections -->
    <line x1="85" y1="55" x2="100" y2="70" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <line x1="115" y1="55" x2="100" y2="70" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="75" x2="95" y2="85" stroke="#ec4899" stroke-width="1" opacity="0.5"/>
    <line x1="120" y1="75" x2="105" y2="85" stroke="#ec4899" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Decorative elements -->
  <g opacity="0.3">
    <circle cx="30" cy="50" r="8" fill="#a855f7"/>
    <circle cx="170" cy="80" r="6" fill="#ec4899"/>
    <circle cx="40" cy="140" r="5" fill="#a855f7"/>
    <circle cx="160" cy="120" r="7" fill="#ec4899"/>
  </g>
</svg>
